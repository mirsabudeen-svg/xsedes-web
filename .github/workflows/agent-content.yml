name: Agent — Content Manager

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: Plain-English content change instruction
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: node scripts/generate-skills.mjs
      - name: Run content agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          AGENT_INSTRUCTION: ${{ inputs.instruction }}
        run: node scripts/agents/content.mjs
